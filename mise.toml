[tools]
go = "1.26.0"
uv = "0.11.18"
"npm:commitlint" = "19.8.1"
"npm:lefthook" = "1.11.14"
"npm:prettier" = "3.5.3"
"go:github.com/tf63/vetol/cmd/vetol" = "v0.1.0"

[hooks]
postinstall = "lefthook install"

[tasks]
# go
install-tools.run = [
  "go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1",
  "go install golang.org/x/tools/gopls@v0.21.1",
  "go install github.com/go-delve/delve/cmd/dlv@v1.26.0",
]

# claude
claude = "claude --agent coding-agent"

# mcp
serena = "uvx --from git+https://github.com/oraios/serena serena start-mcp-server --transport streamable-http --port 9088"
